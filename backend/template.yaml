AWSTemplateFormatVersion: 2010-09-09
Description: Voice Journal backend — Gemini text formatting
Transform:
- AWS::Serverless-2016-10-31

Resources:
  formatTextFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/format-text.formatTextHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 30
      Description: Formats raw speech-to-text using Gemini 2.5 Flash
      Environment:
        Variables:
          GEMINI_API_KEY: "{{resolve:ssm:GEMINI_API_KEY}}"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /format-text
            Method: POST

Outputs:
  FormatTextEndpoint:
    Description: Format text endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/format-text"

Globals:
  Function:
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true
    Cors:
      AllowMethods: "'POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"
